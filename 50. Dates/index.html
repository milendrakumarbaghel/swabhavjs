<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="lesson">
        <h1>Dates</h1>
        <section class="date-card" aria-label="Current date and time">
            <div class="date-row">
                <span class="label">Date</span>
                <span id="myLabel" class="value">--/--/----</span>
            </div>
            <div class="date-row">
                <span class="label">Time</span>
                <span id="timeLabel" class="value">--:--:-- --</span>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
